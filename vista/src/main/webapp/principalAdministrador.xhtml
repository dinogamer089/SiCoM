<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xml:lang="es" lang="es">

<f:metadata>
    <f:event type="preRenderView" listener="#{loginUI.preventBackAfterLogout}" />
</f:metadata>

<h:head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventos Campestre - Bienvenida</title>
    <style type="text/css">
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #E7D9CB;
            font-family: "FreightText Pro", serif;
        }

        /* CONTENIDO */
        .container {
            text-align: center;
            padding: 40px 10px;
        }
        .logo {
            width: 100px;
            height: auto;
        }
        .welcome-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        h1 {
            font-family: "Minerva Modern", serif;
            font-size: 80px;
            font-style: italic;
            color: #000;
            margin: 0;
        }
        hr {
            width: 70%;
            border: none;
            border-top: 1px solid #000;
            margin: 0 auto 60px auto;
        }

        /* GRID DE TARJETAS */
        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background-color: #000;
            color: #FFF;
            width: 320px;
            height: 200px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            position: relative;
        }
        .card:hover {
            transform: scale(1.05);
            background-color: #3D4435;
            cursor: pointer;
        }
        .card a {
            display: block;
            height: 100%;
            width: 100%;
            color: inherit;
            text-decoration: none;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card img {
            width: 50px;
            height: 50px;
            margin-bottom: 15px;
        }
        .card h2 {
            font-size: 28px;
            margin: 10px 0;
            color: #FFF;
        }
        .card p {
            font-size: 16px;
            margin: 10px 0;
            color: #fff !important;
        }


        /* RESPONSIVO */
        @media (max-width: 700px) {
            .grid {
                flex-direction: column;
                gap: 20px;
            }

            h1 {
                font-size: 50px;
            }
        }
    </style>
</h:head>
<h:body>

    <ui:include src="componentTopbar.xhtml" />

    <div class="container">
        <div class="welcome-section">
            <a href="#">
                <img src="#{request.contextPath}/resources/Elefante.png" alt="Logo" class="logo" />
            </a>
            <h1>¡Bienvenido!</h1>
        </div>
        <hr />

        <div class="grid" >
            <div class="card" >
                <a href="TarjetaAlmacen.xhtml">
                    <img src="#{request.contextPath}/resources/listas-de-control.png" alt="Inventario" />
                    <h2>Inventario</h2>
                    <p>Aquí puedes ver el flujo de cambios en tu inventario</p>
                </a>
            </div>

            <div class="card">
                <a href="Cotizaciones.xhtml">
                    <img src="#{request.contextPath}/resources/calendario.png" alt="Cotizaciones" />
                    <h2>Cotizaciones</h2>
                    <p>Aquí puedes administrar las cotizaciones solicitadas</p>
                </a>
            </div>

            <div class="card">
                <a href="Articulos.xhtml">
                    <img src="#{request.contextPath}/resources/inventario-disponible.png" alt="Artículos" />
                    <h2>Artículos</h2>
                    <p>Aquí administrar los artículos para su cotización</p>
                </a>
            </div>

            <div class="card">
                <a href="Rentas.xhtml">
                    <img src="#{request.contextPath}/resources/reloj.png" alt="Rentas" />
                    <h2>Rentas</h2>
                    <p>Aquí puedes administrar las rentas realizadas</p>
                </a>
            </div>
        </div>
    </div>

</h:body>
</html>
