<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <style type="text/css">
        /*<![CDATA[*/
        .topbar {
            background-color: #3D4435;
            color: #C2C8CC;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            width: 100%;
            font-family: "FreightText Pro", serif;
            line-height: 1.2;
            min-height: 70px;
            z-index: 9999;
            position: relative;
        }

        .topbar-left, .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-center {
            text-align: center;
            flex-grow: 1;
            font-style: italic;
            font-size: 22px;
            line-height: 1.1;
        }

        .topbar a {
            text-decoration: none;
            color: #C2C8CC;
            font-size: 16px;
            margin: 0 5px;
            font-style: italic;
        }

        .topbar-center a {
            font-size: 16px;
        }

        .topbar-center a:first-child {
            font-size: 22px;
            display: block;
            margin-bottom: 2px;
        }

        .topbar a:hover {
            text-decoration: underline;
        }

        .topbar img {
            width: 20px;
            height: 20px;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            right: 0;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }
        /*]]>*/
    </style>

    <div class="topbar">
        <div class="topbar-left">
            <img src="resources/edicion.png" alt="Empleados" />
            <a href="AdminEmpleados.xhtml">Empleados</a>
        </div>
        <div class="topbar-center">
            <a href="principalAdministrador.xhtml">EVENTOS CAMPESTRE</a>
            <a href="Articulos.xhtml">Artículos</a>
            <a href="CombinacionMesa.xhtml">Combinacion de mesas</a>
            <a href="Cotizaciones.xhtml">Cotizaciones</a>
            <a href="Rentas.xhtml">Rentas</a>
            <a href="Dashboard.xhtml">Informes</a>
            <a href="TarjetaAlmacen.xhtml">Inventario</a>
        </div>
        <div class="topbar-right">
            <h:form>
                <div class="dropdown">
                    <span>Administrador</span>
                    <img src="resources/user.png" alt="User" />
                    <div class="dropdown-content">
                        <h:commandLink action="#{loginUI.logout}" value="Cerrar Sesión" />
                    </div>
                </div>
            </h:form>
        </div>
    </div>
</ui:composition>
