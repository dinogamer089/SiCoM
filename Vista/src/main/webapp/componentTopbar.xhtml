<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <style type="text/css">
        html {
            scrollbar-gutter: stable;
        }
        body {
            margin: 0 !important;
            padding: 0 !important;
        }

        .topbar {
            background-color: #3D4435;
            color: #C2C8CC;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            width: 100%;
            font-family: "FreightText Pro", serif;
            line-height: 1.2;
            min-height: 70px;
            z-index: 9999;
            position: relative;
        }

        .topbar *, .topbar *:before, .topbar *:after {
            box-sizing: border-box;
        }

        .topbar-left, .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .topbar-center {
            text-align: center;
            flex-grow: 1;
            font-style: italic;
            font-size: 22px;
            line-height: 1.1;
        }

        .topbar a {
            text-decoration: none;
            color: #C2C8CC;
            font-size: 16px;
            margin: 0 5px;
            font-style: italic;
            display: inline-block;
            vertical-align: middle;
        }

        .topbar-center a {
            font-size: 16px;
        }

        .topbar-center a:first-child {
            font-size: 22px;
            display: block;
            margin-bottom: 2px;
        }

        .topbar a:hover {
            text-decoration: underline;
        }

        .topbar img, .topbar-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
        }

        .dropdown {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 0;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1000;
            border-radius: 4px;
        }

        .dropdown-content a {
            color: #333 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
            font-style: normal;
            font-size: 14px;
            margin: 0;
        }

        .dropdown-content a:hover {
            background-color: #ddd;
            text-decoration: none;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }
    </style>

    <div class="topbar">
        <div class="topbar-left">
            <img src="#{request.contextPath}/resources/edicion.png" alt="Empleados" class="topbar-icon" />
            <a href="#{request.contextPath}/AdminEmpleados.xhtml">Empleados</a>
        </div>

        <div class="topbar-center">
            <a href="#{request.contextPath}/principalAdministrador.xhtml">EVENTOS CAMPESTRE</a>
            <a href="#{request.contextPath}/Articulos.xhtml">Artículos</a>
            <a href="#{request.contextPath}/CombinacionMesa.xhtml">Combinacion de mesas</a>
            <a href="#{request.contextPath}/Cotizaciones.xhtml">Cotizaciones</a>
            <a href="#{request.contextPath}/Rentas.xhtml">Rentas</a>
            <a href="#{request.contextPath}/Dashboard.xhtml">Informes</a>
            <a href="#{request.contextPath}/TarjetaAlmacen.xhtml">Inventario</a>
        </div>

        <div class="topbar-right">
            <h:form style="margin:0; padding:0;">
                <div class="dropdown">
                    <span>Administrador</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="topbar-icon">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>

                    <div class="dropdown-content">
                        <h:commandLink action="#{loginUI.logout}" value="Cerrar Sesión" />
                    </div>
                </div>
            </h:form>
        </div>
    </div>
</ui:composition>
