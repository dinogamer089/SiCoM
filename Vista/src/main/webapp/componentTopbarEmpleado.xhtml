<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <p:growl id="empGrowl" showDetail="true" life="4000" globalOnly="true">
        <p:autoUpdate />
    </p:growl>

    <style type="text/css">
        /*<![CDATA[*/
        :root {
            --olive: #3D4435;
            --beige: #E9DFD3;
            --black: #000000;
            --white: #ffffff;
            --font-titles: "Minerva Modern", serif;
            --font-body: "FreightText Pro", "Segoe UI", sans-serif;
        }

        .topbar {
            background-color: var(--olive);
            color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            width: 100%;
            font-family: var(--font-body);
            line-height: 1.2;
            min-height: 70px;
            z-index: 9999;
            position: relative;
        }

        .topbar-left, .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-center {
            text-align: center;
            flex-grow: 1;
            font-style: italic;
            font-size: 22px;
            line-height: 1.1;
        }

        .topbar a {
            text-decoration: none;
            color: var(--white);
            opacity: 0.9;
            font-size: 16px;
            margin: 0 5px;
            font-style: italic;
        }

        .topbar-center a {
            font-size: 22px;
        }

        .topbar a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .topbar img, .topbar i {
            width: 20px;
            height: 20px;
            color: inherit;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1000;
            right: 0;
            border-radius: 4px;
        }

        .dropdown-content a {
            color: #333 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
            font-style: normal;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }
        /*]]>*/
    </style>

    <div class="topbar">
        <div class="topbar-left">
            <span style="font-size:14px; font-style: italic;">Módulo Operativo</span>
        </div>
        <div class="topbar-center">
            <a href="RentasEmpleado.xhtml">EVENTOS CAMPESTRE</a>
        </div>
        <div class="topbar-right">
            <h:form>
                <div class="dropdown">
                    <span>Empleado</span>
                    <i class="pi pi-user" style="font-size: 1.2rem;"></i>
                    <div class="dropdown-content">
                        <h:commandLink action="#{loginUI.logout}" value="Cerrar Sesión" />
                    </div>
                </div>
            </h:form>
        </div>
    </div>
</ui:composition>
